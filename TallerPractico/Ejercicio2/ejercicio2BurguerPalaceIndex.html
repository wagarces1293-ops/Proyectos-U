<!DOCTYPE html>
<html lang="es">
<head>

    <title>Burger Palace - Ciclo Real</title>
    <link rel="stylesheet" href="ejercicio2BurguerPalaceStile.css">
</head>
<body>

        <h1>🍔 BURGUER PALACE</h1>

    </div>
